<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nhạc Của Tôi">
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/srymcfear/verify_me/refs/heads/main/assets/icon/fear_logo.ico">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/srymcfear/verify_me/refs/heads/main/assets/icon/fear_logo.ico">
  <title>Nhạc Của Tôi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      /* Ngăn font tự động phóng to trên iOS khi xoay ngang */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Ngăn chặn mọi hành vi zoom trên web */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #121212;
      color: white;
      min-height: 100vh;
      padding-bottom: 260px;
      -webkit-overflow-scrolling: touch;
      /* Khóa zoom hoàn toàn */
      touch-action: pan-x pan-y;
      -webkit-touch-callout: none;
    }

    /* Ngăn double-tap zoom trên các phần tử có thể click */
    .tab, .icon-btn, .song-item, .ctrl-btn, .mode-btn, .volume-icon, .search-bar {
      touch-action: manipulation;
    }

    /* Input không bị zoom khi focus (iOS) */
    input, select, textarea {
      font-size: 16px;
      /* Font size >= 16px để tránh iOS tự động zoom khi focus */
    }

    .tabs-container {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      padding: 12px 16px;
      background: #1a1a1a;
      position: sticky;
      top: 0;
      z-index: 99;
      -webkit-overflow-scrolling: touch;
      /* Ngăn zoom khi kéo ngang */
      touch-action: pan-x pan-y;
    }

    .tab {
      padding: 8px 14px;
      background: #282828;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      /* Ngăn double-tap zoom */
      touch-action: manipulation;
    }

    .tab.active {
      background: #1ed760;
      color: black;
      font-weight: 600;
    }

    .tab.liked-tab {
      padding: 8px 12px;
    }
    .tab.liked-tab .tab-text {
      display: none;
    }

    .icon-btn {
      background: #282828;
      border: none;
      border-radius: 30px;
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }

    .icon-btn:active {
      transform: scale(0.96);
    }

    .add-btn {
      background: #1ed760;
      color: black;
    }

    .select-btn {
      background: #282828;
      color: white;
    }

    .control-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #121212;
      position: sticky;
      top: 54px;
      z-index: 98;
    }

    .search-bar {
      flex: 1;
      padding: 12px 16px;
      background: #282828;
      border: none;
      border-radius: 30px;
      color: white;
      font-size: 16px;
      font-family: inherit;
      /* Font 16px để tránh zoom iOS */
    }

    .search-bar::placeholder {
      color: #888;
    }

    .search-bar:focus {
      outline: none;
      background: #3a3a3a;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .song-info {
      text-align: center;
      margin: 30px 0 25px;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .artist {
      font-size: 18px;
      color: #b3b3b3;
    }

    .progress-container {
      height: 6px;
      background: #404040;
      border-radius: 999px;
      margin: 20px 0;
      cursor: pointer;
      overflow: hidden;
      touch-action: manipulation;
    }

    .progress {
      height: 100%;
      background: linear-gradient(to right, #1ed760, #30e88a);
      border-radius: 999px;
      width: 0%;
    }

    .time {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #b3b3b3;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    .song-item {
      display: flex;
      align-items: center;
      padding: 12px 10px;
      border-radius: 12px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .song-item:hover, .song-item.playing {
      background: rgba(30, 215, 96, 0.15);
    }

    .song-item img {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      margin-right: 14px;
      object-fit: cover;
      background: #282828;
    }

    /* Player Bar */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(18, 18, 18, 0.98);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 14px 20px 22px;
      z-index: 1000;
    }

    .player-main-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .player-cover {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
      background: #282828;
    }

    .player-info {
      flex: 1;
      overflow: hidden;
    }

    .player-title {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-artist {
      color: #b3b3b3;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .progress-mini {
      height: 3px;
      background: #404040;
      border-radius: 999px;
      margin-top: 8px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .progress-mini-fill {
      height: 100%;
      background: #1ed760;
      border-radius: 999px;
      width: 0%;
    }

    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin: 14px 0 16px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 28px;
      color: white;
      opacity: 0.8;
      transition: all 0.1s ease;
      touch-action: manipulation;
    }

    .ctrl-btn:active {
      transform: scale(0.92);
    }

    .ctrl-btn.play {
      width: 56px;
      height: 56px;
      background: #1ed760;
      border-radius: 50%;
      font-size: 28px;
      color: black;
      opacity: 1;
      box-shadow: 0 4px 12px rgba(30, 215, 96, 0.3);
    }

    .mode-buttons {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 14px;
    }

    .mode-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.1s ease;
      padding: 4px 10px;
      border-radius: 20px;
      touch-action: manipulation;
    }

    .mode-btn.active {
      opacity: 1;
      color: #1ed760;
      background: rgba(30, 215, 96, 0.15);
    }

    .volume-section {
      width: 100%;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .volume-icon {
      font-size: 16px;
      color: #1ed760;
      cursor: pointer;
      touch-action: manipulation;
    }

    .volume-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: #404040;
      border-radius: 999px;
      touch-action: manipulation;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #1ed760;
      border-radius: 50%;
      cursor: pointer;
    }

    .volume-value {
      font-size: 12px;
      color: #b3b3b3;
      min-width: 40px;
      text-align: right;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #888;
    }

    .section-title {
      margin: 16px 0 8px;
      font-size: 17px;
      font-weight: 600;
    }

    .song-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 12px;
      accent-color: #1ed760;
      touch-action: manipulation;
    }

    .toast {
      position: fixed;
      bottom: 280px;
      left: 20px;
      right: 20px;
      background: #1ed760;
      color: black;
      padding: 12px;
      border-radius: 30px;
      text-align: center;
      font-weight: 600;
      z-index: 2000;
      animation: fadeOut 2s ease forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }

    @media (max-width: 480px) {
      .title {
        font-size: 22px;
      }
      .artist {
        font-size: 15px;
      }
      .ctrl-btn.prev, .ctrl-btn.next {
        font-size: 24px;
      }
      .ctrl-btn.play {
        width: 50px;
        height: 50px;
        font-size: 24px;
      }
      .player-cover {
        width: 44px;
        height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="tabs-container" id="tabsContainer">
    <div id="tabs" style="display:flex; gap:8px; flex:1; overflow-x:auto;"></div>
    <button class="icon-btn select-btn" onclick="toggleSelectAll()">✅</button>
    <button class="icon-btn add-btn" onclick="addSongs()">➕</button>
  </div>

  <div class="control-bar">
    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Tìm kiếm..." onkeyup="filterSongs()">
    <button id="deleteSelectedBtn" class="icon-btn delete-btn" style="display:none;" onclick="deleteSelected()">🗑</button>
  </div>

  <div class="container">
    <div class="song-info">
      <div class="title" id="title">Chọn bài hát</div>
      <div class="artist" id="artist"></div>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress" id="progress"></div>
    </div>
    <div class="time">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div id="playlistContainer"></div>
  </div>

  <!-- Player Bar -->
  <div class="player-bar">
    <div class="player-main-row" onclick="scrollToTop()">
      <img id="barCover" class="player-cover" src="https://picsum.photos/id/870/100/100">
      <div class="player-info">
        <div id="barTitle" class="player-title">Chưa phát nhạc</div>
        <div id="barArtist" class="player-artist"></div>
        <div class="progress-mini" id="progressMiniContainer" onclick="event.stopPropagation()">
          <div id="progressMiniFill" class="progress-mini-fill"></div>
        </div>
      </div>
    </div>

    <div class="mode-buttons" onclick="event.stopPropagation()">
      <button class="mode-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Phát ngẫu nhiên">🔀</button>
      <button class="mode-btn" id="repeatBtn" onclick="toggleRepeat()" title="Lặp lại">🔁</button>
    </div>

    <div class="player-controls" onclick="event.stopPropagation()">
      <button class="ctrl-btn" onclick="prevSong()">⏮</button>
      <button class="ctrl-btn play" id="playBtnBar" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextSong()">⏭</button>
    </div>

    <div class="volume-section" onclick="event.stopPropagation()">
      <div class="volume-row">
        <span class="volume-icon" id="volumeIcon" onclick="toggleMute()">🔊</span>
        <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
        <span id="volumePercent" class="volume-value">70%</span>
      </div>
    </div>
  </div>

  <audio id="audio" preload="metadata" playsinline webkit-playsinline></audio>
  <input type="file" id="fileInput" accept=".mp3,audio/mpeg" multiple style="display:none;">

  <script>
    // ==================== DISABLE ZOOM - THÊM SCRIPT CHẶN ZOOM ====================
    // Ngăn pinch-to-zoom bằng JavaScript (lớp bảo vệ thứ 2)
    document.addEventListener('touchmove', function(event) {
      if (event.scale !== undefined && event.scale !== 1) {
        event.preventDefault();
      }
    }, { passive: false });

    // Ngăn double-tap zoom
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

    // Ngăn gesture zoom
    document.addEventListener('gesturestart', function(event) {
      event.preventDefault();
    });

    // ==================== CODE CHÍNH ====================
    let db;
    let playlists = {};
    let currentPlaylistName = "❤️";
    let currentIndex = 0;
    let isPlaying = false;
    let selectedSongs = new Set();
    let currentSearchQuery = "";
    let currentSongId = null;
    let currentBlobUrl = null;
    
    let shuffleMode = false;
    let repeatMode = false;
    let shuffledIndices = [];

    const audio = document.getElementById('audio');
    const fileInput = document.getElementById('fileInput');
    const titleEl = document.getElementById('title');
    const artistEl = document.getElementById('artist');
    const barTitle = document.getElementById('barTitle');
    const barArtist = document.getElementById('barArtist');
    const barCover = document.getElementById('barCover');
    const playBtnBar = document.getElementById('playBtnBar');
    const progressFill = document.getElementById('progress');
    const progressMiniFill = document.getElementById('progressMiniFill');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumePercent = document.getElementById('volumePercent');
    const volumeIcon = document.getElementById('volumeIcon');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const repeatBtn = document.getElementById('repeatBtn');

    let lastVolume = 70;
    audio.volume = 0.7;

    function updateVolumeIcon(value) {
      const v = parseInt(value);
      if (v == 0) volumeIcon.textContent = '🔇';
      else if (v < 30) volumeIcon.textContent = '🔈';
      else if (v < 70) volumeIcon.textContent = '🔉';
      else volumeIcon.textContent = '🔊';
    }

    function handleVolumeChange() {
      const val = volumeSlider.value;
      audio.volume = val / 100;
      volumePercent.textContent = val + '%';
      updateVolumeIcon(val);
      if (val > 0) lastVolume = val;
    }

    function toggleMute() {
      if (volumeSlider.value > 0) {
        lastVolume = volumeSlider.value;
        volumeSlider.value = 0;
      } else {
        volumeSlider.value = lastVolume;
      }
      handleVolumeChange();
    }

    volumeSlider.addEventListener('input', handleVolumeChange);
    handleVolumeChange();

    function updateShuffleIndices() {
      const songs = playlists[currentPlaylistName] || [];
      const count = songs.length;
      if (!shuffleMode || count === 0) {
        shuffledIndices = [];
        return;
      }
      let indices = Array.from({ length: count }, (_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      shuffledIndices = indices;
    }

    function toggleShuffle() {
      shuffleMode = !shuffleMode;
      if (shuffleMode) {
        updateShuffleIndices();
        shuffleBtn.classList.add('active');
      } else {
        shuffleBtn.classList.remove('active');
        shuffledIndices = [];
      }
      showToast(shuffleMode ? "🔀 Phát ngẫu nhiên" : "➡️ Phát tuần tự");
    }

    function toggleRepeat() {
      repeatMode = !repeatMode;
      if (repeatMode) {
        repeatBtn.classList.add('active');
        showToast("🔁 Lặp lại danh sách");
      } else {
        repeatBtn.classList.remove('active');
        showToast("➡️ Phát một lần");
      }
    }

    function getNextIndex() {
      const songs = playlists[currentPlaylistName];
      if (!songs || songs.length === 0) return -1;
      
      if (shuffleMode && shuffledIndices.length > 0) {
        const currentPos = shuffledIndices.findIndex(i => i === currentIndex);
        let nextPos = currentPos + 1;
        if (nextPos >= shuffledIndices.length) {
          if (repeatMode) {
            updateShuffleIndices();
            nextPos = 0;
          } else {
            return -1;
          }
        }
        return shuffledIndices[nextPos];
      } else {
        let nextIdx = currentIndex + 1;
        if (nextIdx >= songs.length) {
          if (repeatMode) {
            nextIdx = 0;
          } else {
            return -1;
          }
        }
        return nextIdx;
      }
    }

    function getPrevIndex() {
      const songs = playlists[currentPlaylistName];
      if (!songs || songs.length === 0) return -1;
      
      if (shuffleMode && shuffledIndices.length > 0) {
        const currentPos = shuffledIndices.findIndex(i => i === currentIndex);
        let prevPos = currentPos - 1;
        if (prevPos < 0) {
          if (repeatMode) {
            updateShuffleIndices();
            prevPos = shuffledIndices.length - 1;
          } else {
            return -1;
          }
        }
        return shuffledIndices[prevPos];
      } else {
        let prevIdx = currentIndex - 1;
        if (prevIdx < 0) {
          if (repeatMode) {
            prevIdx = songs.length - 1;
          } else {
            return -1;
          }
        }
        return prevIdx;
      }
    }

    function showToast(msg, isErr = false) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      toast.style.background = isErr ? '#e74c3c' : '#1ed760';
      toast.style.color = isErr ? 'white' : 'black';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function formatTime(sec) {
      if (isNaN(sec)) return "0:00";
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function updateProgress() {
      if (!audio.duration) return;
      const p = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = p + '%';
      if (progressMiniFill) progressMiniFill.style.width = p + '%';
      currentTimeSpan.textContent = formatTime(audio.currentTime);
      durationSpan.textContent = formatTime(audio.duration);
    }

    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', () => {
      durationSpan.textContent = formatTime(audio.duration);
    });

    document.getElementById('progressContainer').addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });

    document.getElementById('progressMiniContainer').addEventListener('click', (e) => {
      if (!audio.duration) return;
      e.stopPropagation();
      const rect = e.currentTarget.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });

    audio.addEventListener('ended', () => {
      const next = getNextIndex();
      if (next !== -1) {
        playSong(currentPlaylistName, next);
      } else {
        audio.pause();
      }
    });

    audio.addEventListener('play', () => {
      isPlaying = true;
      playBtnBar.innerHTML = '⏸';
    });
    
    audio.addEventListener('pause', () => {
      isPlaying = false;
      playBtnBar.innerHTML = '▶';
    });

    function initDB() {
      return new Promise((resolve) => {
        const req = indexedDB.open("MusicPlayerDB", 5);
        req.onupgradeneeded = (e) => {
          db = e.target.result;
          if (!db.objectStoreNames.contains("songFiles")) {
            db.createObjectStore("songFiles", { keyPath: "id" });
          }
        };
        req.onsuccess = (e) => { db = e.target.result; resolve(); };
        req.onerror = () => resolve();
      });
    }

    async function saveSongFile(id, file, meta) {
      return new Promise((resolve) => {
        const tx = db.transaction("songFiles", "readwrite");
        tx.objectStore("songFiles").put({ id, blob: file, ...meta });
        tx.oncomplete = resolve;
      });
    }

    async function getSongFile(id) {
      return new Promise((resolve) => {
        if (!db) { resolve(null); return; }
        const req = db.transaction("songFiles").objectStore("songFiles").get(id);
        req.onsuccess = () => resolve(req.result);
      });
    }

    function loadPlaylists() {
      const saved = localStorage.getItem('playlists_v5');
      if (saved) playlists = JSON.parse(saved);
      else playlists = { "❤️": [] };
      if (!playlists["❤️"]) playlists["❤️"] = [];
      currentPlaylistName = "❤️";
    }

    function savePlaylists() {
      localStorage.setItem('playlists_v5', JSON.stringify(playlists));
    }

    async function addSongToPlaylist(file) {
      if (!file.name.endsWith('.mp3')) {
        showToast(`⚠️ ${file.name} không phải MP3`, true);
        return false;
      }
      const id = 's_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      const title = file.name.replace(/\.mp3$/i, "");
      await saveSongFile(id, file, { title, artist: "Local", cover: "https://picsum.photos/id/870/100/100" });
      playlists[currentPlaylistName].push({ id, title, artist: "Local", cover: "https://picsum.photos/id/870/100/100" });
      savePlaylists();
      return true;
    }

    async function addSongs() { fileInput.click(); }

    fileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;
      showToast(`📀 Đang thêm...`);
      let added = 0;
      for (let f of files) if (await addSongToPlaylist(f)) added++;
      if (added) { renderPlaylist(); renderTabs(); showToast(`✅ Đã thêm ${added} bài`); }
      else showToast(`❌ Thêm thất bại`, true);
      fileInput.value = '';
    });

    async function playSong(playlistName, index) {
      const playlist = playlists[playlistName];
      if (!playlist || index >= playlist.length) return;
      currentPlaylistName = playlistName;
      currentIndex = index;
      const song = playlist[currentIndex];
      currentSongId = song.id;
      
      const data = await getSongFile(song.id);
      if (!data?.blob) { showToast(`❌ Không tìm thấy file`, true); return; }
      
      if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
      currentBlobUrl = URL.createObjectURL(data.blob);
      audio.src = currentBlobUrl;
      audio.load();
      
      titleEl.textContent = song.title;
      artistEl.textContent = song.artist;
      barTitle.textContent = song.title;
      barArtist.textContent = song.artist;
      barCover.src = song.cover;
      
      if (navigator.mediaSession) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: song.title, artist: song.artist
        });
      }
      
      try { await audio.play(); } catch(e) {}
      renderPlaylist();
      renderTabs();
    }

    async function togglePlay() {
      if (!audio.src) {
        const s = playlists[currentPlaylistName];
        if (s?.length) playSong(currentPlaylistName, 0);
        return;
      }
      isPlaying ? audio.pause() : await audio.play();
    }

    function nextSong() {
      const next = getNextIndex();
      if (next !== -1) playSong(currentPlaylistName, next);
    }

    function prevSong() {
      const prev = getPrevIndex();
      if (prev !== -1) playSong(currentPlaylistName, prev);
    }

    function renderTabs() {
      const cont = document.getElementById('tabs');
      if (!cont) return;
      cont.innerHTML = Object.keys(playlists).map(name => {
        const isLiked = name === "❤️";
        if (isLiked) return `<div class="tab liked-tab ${name === currentPlaylistName ? 'active' : ''}" onclick="switchPlaylist('❤️')"><span class="tab-icon">❤️</span></div>`;
        return `<div class="tab ${name === currentPlaylistName ? 'active' : ''}" onclick="switchPlaylist('${name.replace(/'/g, "\\'")}')"><span>${name}</span></div>`;
      }).join('');
    }

    function switchPlaylist(name) {
      currentPlaylistName = name;
      selectedSongs.clear();
      currentIndex = 0;
      if (shuffleMode) updateShuffleIndices();
      renderTabs();
      renderPlaylist();
    }

    function filterSongs() {
      currentSearchQuery = document.getElementById('searchInput').value.toLowerCase();
      renderPlaylist();
    }

    function renderPlaylist() {
      const cont = document.getElementById('playlistContainer');
      let songs = playlists[currentPlaylistName] || [];
      if (currentSearchQuery) songs = songs.filter(s => s.title.toLowerCase().includes(currentSearchQuery));
      
      if (!songs.length) {
        cont.innerHTML = `<div class="empty-state">🎵 Chưa có bài hát nào<br>❤️ Nhấn nút + để thêm MP3</div>`;
      } else {
        let html = `<div class="section-title">📀 ${currentPlaylistName === "❤️" ? "Yêu thích" : currentPlaylistName} (${songs.length})</div>`;
        html += songs.map((s, i) => `<div class="song-item ${currentSongId === s.id ? 'playing' : ''}" onclick="playSongByIndex(${i})">
          <input type="checkbox" ${selectedSongs.has(s.id) ? 'checked' : ''} onclick="event.stopPropagation(); toggleSelect('${s.id}')">
          <img src="${s.cover}" onerror="this.src='https://picsum.photos/id/870/100/100'">
          <div style="flex:1"><div style="font-weight:600;">${escapeHtml(s.title)}</div><div style="color:#b3b3b3;font-size:13px;">${escapeHtml(s.artist)}</div></div>
          ${currentSongId === s.id && isPlaying ? '<span style="color:#1ed760;">🔊</span>' : ''}
        </div>`).join('');
        cont.innerHTML = html;
      }
      const delBtn = document.getElementById('deleteSelectedBtn');
      if (delBtn) delBtn.style.display = selectedSongs.size ? 'flex' : 'none';
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    window.playSongByIndex = function(idx) {
      let songs = playlists[currentPlaylistName] || [];
      if (currentSearchQuery) {
        const filtered = songs.filter(s => s.title.toLowerCase().includes(currentSearchQuery));
        if (idx < filtered.length) {
          const origIdx = songs.findIndex(s => s.id === filtered[idx].id);
          if (origIdx !== -1) playSong(currentPlaylistName, origIdx);
        }
      } else { playSong(currentPlaylistName, idx); }
    };

    window.toggleSelect = function(id) {
      selectedSongs.has(id) ? selectedSongs.delete(id) : selectedSongs.add(id);
      renderPlaylist();
    };

    window.toggleSelectAll = function() {
      const songs = playlists[currentPlaylistName] || [];
      if (selectedSongs.size === songs.length) selectedSongs.clear();
      else songs.forEach(s => selectedSongs.add(s.id));
      renderPlaylist();
    };

    window.deleteSelected = function() {
      if (!selectedSongs.size) return;
      if (!confirm(`Xóa ${selectedSongs.size} bài?`)) return;
      playlists[currentPlaylistName] = playlists[currentPlaylistName].filter(s => !selectedSongs.has(s.id));
      if (selectedSongs.has(currentSongId)) {
        if (playlists[currentPlaylistName].length) playSong(currentPlaylistName, 0);
        else { audio.pause(); audio.src = ''; titleEl.textContent = "Chọn bài hát"; barTitle.textContent = "Chưa phát nhạc"; playBtnBar.innerHTML = '▶'; }
      }
      selectedSongs.clear();
      savePlaylists();
      renderPlaylist();
    };

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    if (navigator.mediaSession) {
      navigator.mediaSession.setActionHandler('play', () => togglePlay());
      navigator.mediaSession.setActionHandler('pause', () => audio.pause());
      navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
      navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
    }

    async function init() {
      loadPlaylists();
      await initDB();
      renderTabs();
      renderPlaylist();
      showToast("🎵 Nhấn + để thêm nhạc MP3");
    }
    init();
  </script>
</body>
</html>
